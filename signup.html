<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>アカウント作成 — sugaku-club.com</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#05071a;--bg2:#080b22;--bg3:#0d1030;--pu:#7c3aed;--pu2:#9f5cf7;--cy:#06b6d4;--ok:#10b981;--ng:#ef4444;--txt:#f1f5f9;--muted:#64748b;--border:rgba(124,58,237,.2)}body{background:var(--bg);color:var(--txt);font-family:'Outfit','Noto Sans JP',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}a{color:inherit;text-decoration:none}.logo{font-size:1.05rem;font-weight:700;background:linear-gradient(135deg,var(--pu2),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;text-align:center;margin-bottom:.3rem}.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.2rem;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.5)}.head{text-align:center;margin-bottom:2rem}.badge{display:inline-block;padding:.25rem .8rem;background:rgba(124,58,237,.15);border:1px solid var(--border);border-radius:6px;font-size:.72rem;color:var(--pu2);font-weight:600;margin-bottom:.8rem}.head h1{font-size:1.4rem;font-weight:800;margin-bottom:.4rem}.head p{font-size:.83rem;color:var(--muted)}.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;margin-bottom:1.8rem}.tab{flex:1;text-align:center;padding:.5rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;color:var(--muted)}.tab.active{background:var(--bg2);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3)}.fg{margin-bottom:1rem}.fg label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.4rem;color:var(--muted)}.fi{width:100%;padding:.68rem .9rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-size:.88rem;font-family:inherit;transition:.2s}.fi:focus{outline:none;border-color:var(--pu);background:rgba(124,58,237,.06)}.fi.err{border-color:var(--ng)}.pw-wrap{position:relative}.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;line-height:1}.plan-select{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.4rem}.ps-opt{position:relative}.ps-opt input{position:absolute;opacity:0;width:0;height:0}.ps-label{display:block;padding:.5rem .7rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;font-size:.78rem;cursor:pointer;transition:.2s;text-align:center}.ps-opt input:checked+.ps-label{background:rgba(124,58,237,.15);border-color:var(--pu);color:var(--pu2);font-weight:600}.ps-label .pn{display:block;font-weight:600}.ps-label .pp{display:block;font-size:.7rem;color:var(--muted)}.sbtn{width:100%;padding:.75rem;background:linear-gradient(135deg,var(--pu),var(--cy));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:.8rem;transition:.2s;display:flex;align-items:center;justify-content:center;gap:.5rem}.sbtn:hover{opacity:.85;transform:translateY(-1px)}.sbtn:disabled{opacity:.5;transform:none;cursor:not-allowed}.errmsg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.6rem .8rem;font-size:.8rem;color:var(--ng);margin-bottom:1rem;display:none}.foot{text-align:center;margin-top:1.2rem;font-size:.8rem;color:var(--muted)}.foot a{color:var(--pu2);cursor:pointer}.foot a:hover{text-decoration:underline}.success{display:none;text-align:center}.success .check{font-size:3rem;margin-bottom:.8rem;animation:pop .5s}.success h2{font-size:1.3rem;font-weight:800;margin-bottom:.5rem}.success p{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}.key-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;font-family:monospace;font-size:1rem;letter-spacing:.06em;text-align:center;position:relative;filter:blur(6px);transition:.3s;margin-bottom:.5rem}.key-box.show{filter:none}.key-actions{display:flex;gap:.6rem;justify-content:center;margin-bottom:1.5rem}.kbtn{padding:.45rem 1rem;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:8px;color:var(--txt);font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s}.kbtn:hover{border-color:var(--pu);background:rgba(124,58,237,.08)}.go-dash{width:100%;padding:.75rem;background:linear-gradient(135deg,var(--pu),var(--cy));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer}@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.2)}100%{transform:scale(1)}}</style></head><body>
<div class="card">
  <div class="head">
    <span class="logo">∑ sugaku-club.com</span>
    <span class="badge">アカウント作成</span>
    <h1>APIキーを取得する</h1>
    <p>登録するだけでAPIキーが即時発行されます</p>
  </div>
  <div class="tabs"><div class="tab active" id="tab-reg" onclick="switchTab('reg')">新規登録</div><div class="tab" id="tab-log" onclick="switchTab('log')">ログイン</div></div>
  <div id="errmsg" class="errmsg"></div>
  <form id="form" onsubmit="submit(event)">
    <div class="fg"><label>メールアドレス</label><input type="email" class="fi" id="email" placeholder="your@email.com" required></div>
    <div class="fg"><label>パスワード</label><div class="pw-wrap"><input type="password" class="fi" id="pass" placeholder="8文字以上" required><button type="button" class="pw-toggle" onclick="togglePw('pass')">👁</button></div></div>
    <div class="fg" id="fg-conf"><label>パスワード確認</label><div class="pw-wrap"><input type="password" class="fi" id="conf" placeholder="パスワードを再入力"><button type="button" class="pw-toggle" onclick="togglePw('conf')">👁</button></div></div>
    <div class="fg" id="fg-plan"><label>プラン</label><div class="plan-select">
      <div class="ps-opt"><input type="radio" name="plan" value="free" id="p0" checked><label for="p0" class="ps-label"><span class="pn">🆓 フリー</span><span class="pp">¥0 / 10,000req</span></label></div>
      <div class="ps-opt"><input type="radio" name="plan" value="payg" id="p1"><label for="p1" class="ps-label"><span class="pn">⚡ 従量課金</span><span class="pp">¥0〜 / 無制限</span></label></div>
      <div class="ps-opt"><input type="radio" name="plan" value="hobby" id="p2"><label for="p2" class="ps-label"><span class="pn">🎮 ホビー</span><span class="pp">¥480 / 50,000req</span></label></div>
      <div class="ps-opt"><input type="radio" name="plan" value="std" id="p3"><label for="p3" class="ps-label"><span class="pn">⭐ スタンダード</span><span class="pp">¥1,480 / 200,000req</span></label></div>
      <div class="ps-opt"><input type="radio" name="plan" value="pro" id="p4"><label for="p4" class="ps-label"><span class="pn">🚀 プロ</span><span class="pp">¥3,980 / 1,000,000req</span></label></div>
    </div></div>
    <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">
    <button type="submit" class="sbtn" id="sbtn"><span id="sbtn-txt">アカウント作成とAPIキー取得 →</span></button>
  </form>
  <div class="success" id="success">
    <div class="check">✅</div>
    <h2>APIキーが発行されました！</h2>
    <p>このキーを安全な場所に保存してください。<br>ダッシュボードでいつでも確認できます。</p>
    <div class="key-box" id="keybox">SGK-????-????????</div>
    <div class="key-actions">
      <button class="kbtn" onclick="revealKey()">🔓 表示</button>
      <button class="kbtn" onclick="copyKey()">📋 コピー</button>
    </div>
    <button class="go-dash" onclick="location.href='/dashboard.html'">ダッシュボードへ移動 →</button>
  </div>
  <div class="foot" id="foot-link"><a onclick="switchTab('log')">すでにアカウントをお持ちの方はこちら</a></div>
</div>
<script>
const API = '';
let mode = 'reg';
let apiKey = '';

function getUrlPlan(){
  const p=new URLSearchParams(location.search).get('plan');
  return p||'free';
}

window.onload = function(){
  const plan=getUrlPlan();
  const r=document.querySelector('input[name=plan][value="'+plan+'"]');
  if(r) r.checked=true;
};

function switchTab(t){
  mode=t;
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  document.getElementById('tab-log').classList.toggle('active',t==='log');
  document.getElementById('fg-conf').style.display=t==='reg'?'':'none';
  document.getElementById('fg-plan').style.display=t==='reg'?'':'none';
  document.getElementById('sbtn-txt').textContent=t==='reg'?'アカウント作成とAPIキー取得 →':'ログイン →';
  document.getElementById('foot-link').innerHTML=t==='reg'?'<a onclick="switchTab(\'log\')">すでにアカウントをお持ちの方はこちら</a>':'<a onclick="switchTab(\'reg\')">新規登録はこちら</a>';
  showErr('');
}

function showErr(msg){
  const e=document.getElementById('errmsg');
  e.textContent=msg; e.style.display=msg?'block':'none';
}

function togglePw(id){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
}

async function submit(e){
  e.preventDefault();
  const hp=document.querySelector('input[name=website]');
  if(hp&&hp.value) return; // honeypot
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const btn=document.getElementById('sbtn');
  btn.disabled=true; document.getElementById('sbtn-txt').textContent='処理中...';
  showErr('');
  try{
    if(mode==='reg'){
      const conf=document.getElementById('conf').value;
      if(pass!==conf){showErr('パスワードが一致しません');btn.disabled=false;document.getElementById('sbtn-txt').textContent='アカウント作成とAPIキー取得 →';return;}
      if(pass.length<8){showErr('パスワードは8文字以上にしてください');btn.disabled=false;document.getElementById('sbtn-txt').textContent='アカウント作成とAPIキー取得 →';return;}
      const plan=document.querySelector('input[name=plan]:checked')?.value||'free';
      const res=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,plan})});
      const data=await res.json();
      if(!res.ok){showErr(data.error||'エラーが発生しました');btn.disabled=false;document.getElementById('sbtn-txt').textContent='アカウント作成とAPIキー取得 →';return;}
      localStorage.setItem('sgk_token',data.token);
      localStorage.setItem('sgk_user',JSON.stringify(data.user));
      localStorage.setItem('sgk_key',data.api_key);
      apiKey=data.api_key;
      document.getElementById('keybox').textContent=apiKey;
      document.getElementById('form').style.display='none';
      document.getElementById('success').style.display='block';
      document.getElementById('foot-link').style.display='none';
    } else {
      const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
      const data=await res.json();
      if(!res.ok){showErr(data.error||'ログインに失敗しました');btn.disabled=false;document.getElementById('sbtn-txt').textContent='ログイン →';return;}
      localStorage.setItem('sgk_token',data.token);
      localStorage.setItem('sgk_user',JSON.stringify(data.user));
      localStorage.setItem('sgk_key',data.api_key);
      location.href='/dashboard.html';
    }
  } catch(err){
    showErr('サーバーへの接続に失敗しました。しばらくしてから再試行してください。');
    btn.disabled=false;
    document.getElementById('sbtn-txt').textContent=mode==='reg'?'アカウント作成とAPIキー取得 →':'ログイン →';
  }
}

function revealKey(){document.getElementById('keybox').classList.toggle('show');}
function copyKey(){
  navigator.clipboard.writeText(apiKey).then(()=>{
    const b=event.target; const t=b.textContent; b.textContent='✅ コピー済み';
    setTimeout(()=>{b.textContent=t},2000);
  });
}
</script></body></html>
