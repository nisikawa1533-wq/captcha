</style>

<script>
// ============================================================
// BOT DETECTION ENGINE v3
// ============================================================
var BotDetector = (function(){
  var _mouse = [], _clicks = [], _keyTimes = [], _startTime = Date.now();
  var _firstMove = null, _firstClick = null, _tabCount = 0, _scrolled = false;
  var _answerTimes = [];

  // イベントリスナー登録
  document.addEventListener('mousemove', function(e){
    if(_firstMove === null) _firstMove = Date.now() - _startTime;
    _mouse.push({x:e.clientX, y:e.clientY, t:Date.now()});
    if(_mouse.length > 200) _mouse.shift();
  }, {passive:true});
  document.addEventListener('click', function(e){
    if(_firstClick === null) _firstClick = Date.now() - _startTime;
    _clicks.push({x:e.clientX, y:e.clientY, t:Date.now()});
  });
  document.addEventListener('scroll', function(){ _scrolled = true; }, {passive:true, once:true});
  document.addEventListener('keydown', function(){ _keyTimes.push(Date.now()); });
  window.addEventListener('blur', function(){ _tabCount++; });

  // マウス軌跡エントロピー（直線度）
  function _entropy(){
    if(_mouse.length < 6) return 0;
    var angles = [];
    for(var i=1;i<Math.min(_mouse.length,50);i++){
      var dx=_mouse[i].x-_mouse[i-1].x, dy=_mouse[i].y-_mouse[i-1].y;
      if(Math.abs(dx)+Math.abs(dy) < 2) continue;
      angles.push(Math.atan2(dy,dx));
    }
    if(angles.length < 3) return 0;
    var mean=angles.reduce(function(a,b){return a+b;},0)/angles.length;
    var variance=angles.reduce(function(s,a){return s+Math.pow(a-mean,2);},0)/angles.length;
    return Math.min(variance/2.5, 1);
  }

  // 自動化フラグ検査
  function _autoFlags(){
    var flags = {};
    flags.webdriver     = !!navigator.webdriver;
    flags.headlessUA    = /HeadlessChrome|PhantomJS|Puppeteer|Playwright/i.test(navigator.userAgent);
    flags.noPlugins     = navigator.plugins.length === 0;
    flags.noLang        = !navigator.language || navigator.languages.length === 0;
    flags.tinyScreen    = screen.width < 200 || screen.height < 200;
    flags.outerZero     = window.outerWidth === 0 && window.outerHeight === 0;
    flags.chromeNoChrome= typeof window.chrome !== 'undefined' && !window.chrome.runtime;
    return flags;
  }

  // スコア計算（0=完全に人間, 100=完全にBot）
  function calculate(){
    var score = 0;
    var details = [];
    var af = _autoFlags();

    if(af.webdriver)  { score+=45; details.push({k:'webdriver検出',     v:'⚠️', bad:true}); }
    else               {             details.push({k:'webdriver',          v:'✅ なし', bad:false}); }
    if(af.headlessUA) { score+=40; details.push({k:'HeadlessブラウザUA', v:'⚠️', bad:true}); }
    else               {             details.push({k:'ブラウザUA',          v:'✅ 正常', bad:false}); }
    if(af.noPlugins)  { score+=8;  details.push({k:'プラグイン',          v:'⚠️ 0件', bad:true}); }
    else               {             details.push({k:'プラグイン',          v:'✅ '+navigator.plugins.length+'件', bad:false}); }
    if(af.noLang)     { score+=12; details.push({k:'言語設定',            v:'⚠️ なし', bad:true}); }
    else               {             details.push({k:'言語',               v:'✅ '+navigator.language, bad:false}); }
    if(af.outerZero)  { score+=20; details.push({k:'ウィンドウサイズ',   v:'⚠️ 0×0', bad:true}); }
    else               {             details.push({k:'ウィンドウ',          v:'✅ '+window.outerWidth+'×'+window.outerHeight, bad:false}); }

    // マウス挙動
    if(_mouse.length < 5) { score+=18; details.push({k:'マウス移動',      v:'⚠️ なし', bad:true}); }
    else {
      var ent = _entropy();
      if(ent < 0.15)      { score+=12; details.push({k:'マウス軌跡',     v:'⚠️ 直線的', bad:true}); }
      else                {             details.push({k:'マウス軌跡',     v:'✅ 自然（entropy '+ent.toFixed(2)+'）', bad:false}); }
    }

    // 初回インタラクション速度
    if(_firstMove !== null && _firstMove < 300)  { score+=8;  details.push({k:'初回移動',  v:'⚠️ 高速('+_firstMove+'ms)', bad:true}); }
    else if(_firstMove !== null)                  {             details.push({k:'初回移動',  v:'✅ '+(_firstMove/1000).toFixed(1)+'s後', bad:false}); }
    else                                          { score+=10; details.push({k:'初回移動',  v:'⚠️ なし', bad:true}); }

    // スクロール
    if(!_scrolled) { score+=3; details.push({k:'スクロール', v:'— なし', bad:false}); }
    else            {            details.push({k:'スクロール', v:'✅ あり', bad:false}); }

    // 回答速度（登録済みなら）
    if(_answerTimes.length > 0){
      var avg = _answerTimes.reduce(function(a,b){return a+b;},0)/_answerTimes.length;
      if(avg < 800) { score+=15; details.push({k:'平均回答速度', v:'⚠️ '+avg.toFixed(0)+'ms', bad:true}); }
      else           {             details.push({k:'平均回答速度', v:'✅ '+avg.toFixed(0)+'ms', bad:false}); }
    }

    return {score: Math.min(score,100), details: details};
  }

  function recordAnswer(ms){ _answerTimes.push(ms); }

  function render(){
    var r = calculate();
    var s = r.score;
    var bar = document.getElementById('botScoreBar');
    var lbl = document.getElementById('botScoreLabel');
    var sig = document.getElementById('botSignals');
    if(!bar) return r;

    var color = s < 20 ? '#10b981' : s < 50 ? '#f59e0b' : '#ef4444';
    var label = s < 20 ? '🟢 人間 ('+s+'%)' : s < 50 ? '🟡 疑わしい ('+s+'%)' : '🔴 Bot疑い ('+s+'%)';
    bar.style.width = s + '%';
    bar.style.background = color;
    lbl.textContent = label;
    lbl.style.color = color;

    sig.innerHTML = '';
    r.details.forEach(function(d){
      var el = document.createElement('div');
      el.style.cssText = 'display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border-radius:5px;padding:3px 7px;font-size:.68rem';
      el.innerHTML = '<span style="color:rgba(148,163,184,.7)">'+d.k+'</span><span style="color:'+(d.bad?'#fca5a5':'#6ee7b7')+';font-weight:600">'+d.v+'</span>';
      sig.appendChild(el);
    });

    return r;
  }

  return { calculate:calculate, recordAnswer:recordAnswer, render:render };
})();

// 定期的にBot解析パネルを更新
setInterval(function(){ BotDetector.render(); }, 1500);
BotDetector.render();

// ============================================================
// Game State
// ============================================================
var TOTAL=4,MAX_FAIL=3,TIME=30,LOCK_SEC=60;
var st={q:[],step:0,score:0,fails:0,sel:null,items:[],tv:TIME,ti:null,done:false,res:[]};

// ── 統合バンクの構築 ──
// CHAL（手作り20問）+ 動的生成で合計10,000問以上
var MASTER_BANK = [];

function buildMasterBank(){
  var generated = QuestionBankGenerator.generateBank(9980);
  MASTER_BANK = CHAL.concat(generated);
  // シャッフル
  MASTER_BANK = MASTER_BANK.sort(function(){return Math.random()-.5;});
  var lbl = document.getElementById('bankSizeLbl');
  if(lbl) lbl.textContent = '📚 問題バンク: ' + MASTER_BANK.length.toLocaleString() + '問';
  console.log('[sugaku-CAPTCHA] バンク構築完了:', MASTER_BANK.length, '問 (テンプレート数:', QuestionBankGenerator.templateCount, ')');
}

function init(){
  if(MASTER_BANK.length === 0) buildMasterBank();
  var sh = [].concat(MASTER_BANK).sort(function(){return Math.random()-.5;});
  st.q = sh.slice(0,TOTAL);
  st.step=0;st.score=0;st.fails=0;st.res=[];
  renderPips();renderCh();
}

function renderPips(){
  var el=document.getElementById("scorePips");el.innerHTML="";
  for(var i=0;i<TOTAL;i++){
    var d=document.createElement("div");
    d.className="sp"+(i===st.step?" act":i<st.step?(st.res[i]?" ok":" ng"):"");
    d.id="pip"+i;el.appendChild(d);
  }
}

function renderCh(){
  var ch=st.q[st.step];
  st.sel=null;st.done=false;
  document.getElementById("stepLbl").textContent=(st.step+1)+" / "+TOTAL;
  document.getElementById("progFill").style.width=(st.step/TOTAL*100)+"%";
  var fb=document.getElementById("feedbackBox");fb.className="fb";fb.textContent="";
  var btn=document.getElementById("subBtn");
  btn.disabled=true;btn.textContent="\u78BA\u8A8D\u3059\u308B \u2192";btn.onclick=handleSubmit;
  var cc=document.getElementById("chContent");cc.innerHTML="";
  var box=document.createElement("div");box.className="ch-box";

  // badge + difficulty
  var dd="";for(var i=0;i<5;i++)dd+='<span class="dd'+(i<ch.diff?" f":"")+'"></span>';
  box.innerHTML='<div class="badge"><span>'+ch.icon+'</span>'+ch.cat+'<span class="diffs">'+dd+'</span></div>';
  box.innerHTML+='<div class="ch-q">'+ch.q.replace(/\n/g,"<br>")+'</div>';
  if(ch.hint)box.innerHTML+='<div class="ch-hint">\uD83D\uDCA1 '+ch.hint+'</div>';
  if(ch.vis)box.innerHTML+='<div class="ch-vis">'+ch.vis+'</div>';

  if(ch.type==="ch"){
    var g=document.createElement("div");
    g.className="opts "+(ch.opts.length<=2?"g1":"g2");
    ch.opts.forEach(function(o,i){
      var b=document.createElement("button");b.className="opt";b.id="o"+i;
      b.innerHTML='<div class="oradio"></div><span>'+o+'</span>';
      b.onclick=(function(idx,tot){return function(){selOpt(idx,tot);};})(i,ch.opts.length);
      g.appendChild(b);
    });
    box.appendChild(g);
  }else if(ch.type==="sort"){
    renderSort(box,ch);
  }else if(ch.type==="tap"){
    renderTap(box,ch);
  }else if(ch.type==="draw"){
    renderDraw(box,ch);
  }else if(ch.type==="slide"){
    renderSlide(box,ch);
  }
  cc.appendChild(box);
  st._chStart = Date.now(); // チャレンジ開始時刻
  startTimer();renderPips();
}

function renderSort(box,ch){
  st.items=[].concat(ch.items).sort(function(){return Math.random()-.5});
  var list=document.createElement("div");list.className="sort-list";list.id="sortList";
  st.items.forEach(function(item){
    var el=document.createElement("div");el.className="si";el.draggable=true;
    el.dataset.id=item.id;
    el.innerHTML='<span class="dh">\u283F\u283F</span><span>'+item.tx+'</span>';
    el.addEventListener("dragstart",onDS);el.addEventListener("dragover",onDO);
    el.addEventListener("drop",onDR);el.addEventListener("dragend",onDE);
    list.appendChild(el);
  });
  box.appendChild(list);
  var hint=document.createElement("div");
  hint.style.cssText="font-size:.74rem;color:var(--mu);margin-top:6px";
  hint.textContent="\u2195 \u4E0A\u4E0B\u30C9\u30E9\u30C3\u30B0\u3067\u4E26\u3079\u66FF\u3048";
  box.appendChild(hint);
  document.getElementById("subBtn").disabled=false;
}

// ── TAP チャレンジ ─────────────────────────────────────────────
function renderTap(box,ch){
  st._tapTimes=[];
  var needed=ch.targetTaps||3;
  var wrap=document.createElement("div");
  wrap.style.cssText="text-align:center;padding:16px 0";
  var lbl=document.createElement("div");
  lbl.id="tapLbl";
  lbl.style.cssText="font-size:2rem;font-weight:900;font-family:'Outfit',sans-serif;color:var(--pl);margin-bottom:16px";
  lbl.textContent="0 / "+needed;
  var tapBtn=document.createElement("button");
  tapBtn.id="tapBtn";
  tapBtn.style.cssText="width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;cursor:pointer;font-size:2.5rem;color:#fff;transition:transform .1s,box-shadow .1s;box-shadow:0 6px 24px rgba(124,58,237,.5)";
  tapBtn.textContent="👆";
  tapBtn.onclick=function(){
    st._tapTimes.push(Date.now());
    var n=st._tapTimes.length;
    lbl.textContent=n+" / "+needed;
    tapBtn.style.transform="scale(0.88)";
    tapBtn.style.boxShadow="0 2px 8px rgba(124,58,237,.3)";
    setTimeout(function(){tapBtn.style.transform="scale(1)";tapBtn.style.boxShadow="0 6px 24px rgba(124,58,237,.5)";},100);
    if(n>=needed){
      tapBtn.disabled=true;
      lbl.style.color="#10b981";
      lbl.textContent="✓ 完了！";
      document.getElementById("subBtn").disabled=false;
    }
  };
  wrap.appendChild(lbl);
  wrap.appendChild(tapBtn);
  box.appendChild(wrap);
}

// ── DRAW チャレンジ ─────────────────────────────────────────────
function renderDraw(box,ch){
  st._drawPoints=[];
  var wrap=document.createElement("div");
  wrap.style.cssText="text-align:center;padding:8px 0";
  var canvas=document.createElement("canvas");
  canvas.width=320;canvas.height=200;
  canvas.style.cssText="border:2px solid rgba(124,58,237,.4);border-radius:12px;background:rgba(0,0,0,.2);cursor:crosshair;touch-action:none;max-width:100%";
  var ctx=canvas.getContext("2d");
  ctx.strokeStyle="#a78bfa";ctx.lineWidth=3;ctx.lineCap="round";ctx.lineJoin="round";
  var drawing=false;
  var clrBtn=document.createElement("button");
  clrBtn.textContent="🗑 やり直し";
  clrBtn.style.cssText="margin-top:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.8rem";
  clrBtn.onclick=function(){ctx.clearRect(0,0,canvas.width,canvas.height);st._drawPoints=[];document.getElementById("subBtn").disabled=true;};
  function getPos(e){
    var r=canvas.getBoundingClientRect();
    var sc=canvas.width/r.width;
    if(e.touches) return {x:(e.touches[0].clientX-r.left)*sc,y:(e.touches[0].clientY-r.top)*sc};
    return {x:(e.clientX-r.left)*sc,y:(e.clientY-r.top)*sc};
  }
  function start(e){e.preventDefault();drawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);st._drawPoints.push(p);}
  function move(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();st._drawPoints.push(p);if(st._drawPoints.length>10)document.getElementById("subBtn").disabled=false;}
  function end(e){e.preventDefault();drawing=false;}
  canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);canvas.addEventListener("mouseup",end);
  canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});canvas.addEventListener("touchend",end);
  wrap.appendChild(canvas);
  wrap.appendChild(document.createElement("br"));
  wrap.appendChild(clrBtn);
  box.appendChild(wrap);
}

// ── SLIDE チャレンジ ────────────────────────────────────────────
function renderSlide(box,ch){
  st._slideHistory=[];
  var target=ch.target||68;
  var wrap=document.createElement("div");
  wrap.style.cssText="text-align:center;padding:16px 0";
  var valLbl=document.createElement("div");
  valLbl.style.cssText="font-size:2.5rem;font-weight:900;font-family:'Outfit',sans-serif;color:var(--pl);margin-bottom:12px";
  valLbl.textContent="50%";
  var slider=document.createElement("input");
  slider.type="range";slider.min=0;slider.max=100;slider.value=50;
  slider.style.cssText="width:90%;accent-color:#7c3aed;height:6px;cursor:pointer";
  var targetLbl=document.createElement("div");
  targetLbl.style.cssText="font-size:.8rem;color:#64748b;margin-top:10px";
  targetLbl.textContent="目標: "+target+"% ±"+(ch.tolerance||5)+"%";
  slider.oninput=function(){
    var v=parseInt(this.value);
    valLbl.textContent=v+"%";
    st._slideHistory.push({v:v,t:Date.now()});
    var diff=Math.abs(v-target);
    if(diff<=(ch.tolerance||5)){
      valLbl.style.color="#10b981";
      document.getElementById("subBtn").disabled=false;
    }else{
      valLbl.style.color=diff<=15?"var(--am)":"var(--pl)";
    }
  };
  wrap.appendChild(valLbl);
  wrap.appendChild(slider);
  wrap.appendChild(targetLbl);
  box.appendChild(wrap);
}

var dSrc=null;
function onDS(e){dSrc=this;this.classList.add("dragging");e.dataTransfer.effectAllowed="move";}
function onDO(e){e.preventDefault();document.querySelectorAll(".si").forEach(function(x){x.classList.remove("dov");});this.classList.add("dov");}
function onDR(e){
  e.stopPropagation();
  if(dSrc!==this){
    var list=document.getElementById("sortList");
    var items=[].slice.call(list.children);
    var si=items.indexOf(dSrc),di=items.indexOf(this);
    if(si<di)list.insertBefore(dSrc,this.nextSibling);else list.insertBefore(dSrc,this);
    var mv=st.items.splice(si,1)[0];st.items.splice(di,0,mv);
  }
}
function onDE(){document.querySelectorAll(".si").forEach(function(x){x.classList.remove("dragging","dov");});}

function selOpt(idx,tot){
  if(st.done)return;
  st.sel=idx;
  for(var i=0;i<tot;i++){var b=document.getElementById("o"+i);if(b)b.classList.toggle("sel",i===idx);}
  document.getElementById("subBtn").disabled=false;
  BotDetector.render(); // 選択時に即時スキャン
}

function startTimer(){
  clearInterval(st.ti);st.tv=TIME;updTimer();
  st.ti=setInterval(function(){
    st.tv--;updTimer();
    if(st.tv<=0){clearInterval(st.ti);onTimeout();}
  },1000);
}
function updTimer(){
  var n=document.getElementById("tNum"),d=document.getElementById("tDot");
  n.textContent=st.tv;
  d.className="tdot"+(st.tv<=5?" d":st.tv<=10?" w":"");
  n.style.color=st.tv<=5?"var(--ng)":st.tv<=10?"var(--am)":"var(--tx)";
}
function onTimeout(){
  if(st.done)return;
  showFb(false,"\u23F0 \u30BF\u30A4\u30E0\u30A2\u30A6\u30C8\uFF01");
  doWrong();
}

function handleSubmit(){
  if(st.done)return;
  clearInterval(st.ti);st.done=true;
  // 回答所要時間をBot検出エンジンに登録
  if(st._chStart) BotDetector.recordAnswer(Date.now() - st._chStart);
  var ch=st.q[st.step];
  if(ch.type==="ch"){
    if(st.sel===null){st.done=false;return;}
    var ok=st.sel===ch.ans;
    markCh(ok,ch);
    if(ok)doCorrect(ch);else doWrong(ch);
  }else{
    var uo=st.items.map(function(x){return x.id;});
    var ok=JSON.stringify(uo)===JSON.stringify(ch.correctOrder);
    markSort(ok,ch);
    if(ok)doCorrect(ch);else doWrong(ch);
  }
  BotDetector.render(); // 回答後にスコア更新
}
function markCh(ok,ch){
  ch.opts.forEach(function(_,i){
    var b=document.getElementById("o"+i);if(!b)return;
    b.disabled=true;
    if(i===ch.ans)b.classList.add("ok");
    else if(i===st.sel&&!ok)b.classList.add("ng");
  });
}
function markSort(ok,ch){
  var list=document.getElementById("sortList");
  [].slice.call(list.children).forEach(function(el,pos){
    var good=el.dataset.id===ch.correctOrder[pos];
    el.style.borderColor=good?"var(--ok)":"var(--ng)";
    el.style.background=good?"rgba(16,185,129,.1)":"rgba(239,68,68,.1)";
  });
}
function doCorrect(ch){
  st.score++;st.res.push(true);
  showFb(true,"\u2713 \u6B63\u89E3\uFF01 "+(ch.exp||""));
  setPip(st.step,"ok");
  var btn=document.getElementById("subBtn");
  btn.textContent="\u6B21\u3078 \u2192";btn.disabled=false;btn.onclick=nextStep;
  setTimeout(nextStep,2800);
}
function doWrong(ch){
  st.fails++;st.res.push(false);
  showFb(false,"\u2717 \u4E0D\u6B63\u89E3\u3002"+((ch&&ch.exp)||""));
  setPip(st.step,"ng");
  if(st.fails>=MAX_FAIL){setTimeout(showLocked,1500);return;}
  var btn=document.getElementById("subBtn");
  btn.textContent="\u6B21\u3078 \u2192";btn.disabled=false;btn.onclick=nextStep;
  setTimeout(nextStep,3000);
}
function nextStep(){
  st.step++;document.getElementById("subBtn").onclick=handleSubmit;
  if(st.step>=TOTAL)showResult();
  else{renderPips();renderCh();}
}
function showResult(){
  clearInterval(st.ti);
  var pass=st.score>=Math.ceil(TOTAL*.75);
  if(pass){
    document.getElementById("chArea").style.display="none";
    document.getElementById("succScreen").classList.add("show");
    var tk="SGK-"+Date.now().toString(36).toUpperCase()+"-"+Math.random().toString(36).substr(2,8).toUpperCase();
    document.getElementById("tokenBox").textContent="\u2713 CAPTCHA TOKEN: "+tk;
    confetti();
  }else showLocked();
}
function showLocked(){
  clearInterval(st.ti);
  document.getElementById("chArea").style.display="none";
  document.getElementById("lockedScreen").classList.add("show");
  var sec=LOCK_SEC,cd=document.getElementById("lockCD");
  cd.textContent=sec+"\u79D2";
  var t=setInterval(function(){sec--;cd.textContent=sec+"\u79D2";if(sec<=0){clearInterval(t);cd.textContent="\u4ECA\u3059\u3050";}},1000);
}
function resetAll(){
  document.getElementById("chArea").style.display="";
  document.getElementById("succScreen").classList.remove("show");
  document.getElementById("lockedScreen").classList.remove("show");
  document.getElementById("subBtn").onclick=handleSubmit;
  init();
}
function showFb(ok,msg){
  var fb=document.getElementById("feedbackBox");
  fb.className="fb show "+(ok?"ok":"ng");
  fb.innerHTML="<span>"+(ok?"\u2705":"\u274C")+"</span><span>"+msg+"</span>";
}
function setPip(idx,cls){
  var p=document.getElementById("pip"+idx);if(p)p.className="sp "+cls;
}
function confetti(){
  var cl=["#7c3aed","#06b6d4","#10b981","#f59e0b","#a78bfa","#34d399"];
  var sty=document.createElement("style");
  sty.textContent="@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}";
  document.head.appendChild(sty);
  for(var i=0;i<60;i++){
    (function(delay){
      setTimeout(function(){
        var s=document.createElement("div");
        var sz=6+Math.random()*10,c=cl[Math.floor(Math.random()*cl.length)],dur=1+Math.random()*2;
        s.style.cssText="position:fixed;z-index:999;width:"+sz+"px;height:"+sz+"px;background:"+c+";border-radius:"+(Math.random()>.5?"50%":"2px")+";left:"+(15+Math.random()*70)+"%;top:-20px;opacity:.9;animation:cfall "+dur+"s linear forwards;";
        document.body.appendChild(s);
        setTimeout(function(){s.remove();},dur*1000+200);
      },delay);
    })(i*40);
  }
}

init();
</script>
</body>
