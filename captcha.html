th:30px;text-align:right}.tnum.ok{color:var(--cy)}.tnum.warn{color:var(--gd)}.tnum.danger{color:var(--ng)}.tdot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;animation:pulse 1.2s infinite}.tdot.warn{background:var(--gd)}.tdot.danger{background:var(--ng)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}.ch-wrap{min-height:190px;animation:fadeIn .35s}.@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.ch-cat{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}.ch-q{font-size:.93rem;font-weight:600;line-height:1.55;margin-bottom:.7rem;white-space:pre-line}.hint{font-size:.74rem;color:var(--muted);font-style:italic;margin-bottom:.9rem;padding:.4rem .6rem;background:rgba(6,182,212,.06);border-radius:6px;border-left:2px solid var(--cy)}.opts{display:flex;flex-direction:column;gap:.45rem}.opt{padding:.6rem .9rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:.86rem;transition:.18s;text-align:left;color:var(--txt)}.opt:hover:not(:disabled){border-color:rgba(124,58,237,.6);background:rgba(124,58,237,.09)}.opt.sel{border-color:var(--pu);background:rgba(124,58,237,.14);font-weight:600}.opt.ok{border-color:var(--ok)!important;background:rgba(16,185,129,.1)!important;font-weight:600;pointer-events:none}.opt.ng{border-color:var(--ng)!important;background:rgba(239,68,68,.08)!important;pointer-events:none}.opt:disabled{pointer-events:none}.sort-list{display:flex;flex-direction:column;gap:.4rem}.sort-item{padding:.58rem .85rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;font-size:.84rem;cursor:grab;display:flex;align-items:center;gap:.55rem;transition:.18s;user-select:none}.sort-item:active{cursor:grabbing;opacity:.7}.sort-item .handle{color:rgba(255,255,255,.25);font-size:.9rem}.sort-item.dragover{border-color:var(--pu);background:rgba(124,58,237,.1)}.fb{min-height:0;margin:.7rem 0 0;padding:.55rem .8rem;border-radius:9px;font-size:.81rem;text-align:left;display:none;line-height:1.45}.fb.ok{display:block;background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.25);color:var(--ok)}.fb.ng{display:block;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}.fb.warn{display:block;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:var(--gd)}.sbtn{width:100%;padding:.7rem;background:linear-gradient(135deg,var(--pu),var(--cy));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.93rem;cursor:pointer;margin-top:.8rem;transition:.2s}.sbtn:hover:not(:disabled){opacity:.87;transform:translateY(-1px)}.sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}.fn{text-align:center;font-size:.71rem;color:var(--muted);margin-top:1.1rem}.success{display:none;text-align:center;animation:fadeIn .4s}.success .big{font-size:2.8rem;margin-bottom:.6rem;animation:pop .45s}@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}.success h2{font-size:1.2rem;font-weight:800;margin-bottom:.45rem}.success p{font-size:.83rem;color:var(--muted);margin-bottom:1.3rem}.tok{background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.25);border-radius:10px;padding:.7rem 1rem;font-family:monospace;font-size:.95rem;text-align:center;color:var(--cy);margin-bottom:1.1rem;letter-spacing:.04em}.gobtn{width:100%;padding:.7rem;background:linear-gradient(135deg,var(--pu),var(--cy));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.93rem;cursor:pointer;transition:.2s}.gobtn:hover{opacity:.87}.lock{display:none;text-align:center;animation:fadeIn .4s}.lock .licon{font-size:2.3rem;margin-bottom:.6rem}.lock h2{font-size:1rem;font-weight:700;color:var(--ng);margin-bottom:.4rem}.lock p{font-size:.81rem;color:var(--muted)}.lcount{font-size:2rem;font-weight:800;font-family:monospace;color:var(--ng);margin:.8rem 0}</style></head><body>

</div>
<script>
// ────────────────────────────────────────────────────────────
// チャレンジバンク（誰でも解ける常識問題のみ）
// ────────────────────────────────────────────────────────────
const BANK = [
  {

    opts:['🧱 砂の詰まった箱','🪶 羽毛の詰まった箱','🫧 空気だけの箱','🍃 枯れ葉の詰まった箱'],
    ans:0, exp:'砂は密度が高く、同じ体積でも断然重くなります。'
  },
  {

    q:'友人が「明日、傘を持っていった方がいいかも」と言いました。\nこの発言が意味することは何でしょう？',
    hint:'友人は何を心配しているか考えてください',
    opts:['明日は晴れると思っている','明日は雨が降るかもしれない','傘を忘れた','傘を貸してほしい'],
    ans:1, exp:'「傘を持っていった方がいい」は雨への備えを勧める表現です。'
  },
  {
    type:'choice', cat:'温度の感覚', icon:'🌡️',
    q:'真夏の炎天下に1時間置いた場合、\n素手で触ったとき最も熱いのはどれでしょう？',
    hint:'黒い物と金属について考えてください',
    opts:['⬛ 黒い金属板','🪵 白い木の板','📦 ダンボール箱','🎽 白いTシャツ'],
    ans:0, exp:'黒は熱を吸収しやすく、金属は熱を蓄えやすいため、黒い金属板が最も高温になります。'
  },
  {
    type:'choice', cat:'状況の読み取り', icon:'💬',
    q:'テストの点数が低かった友人に対して\n先生が「よく頑張ったね〜」と言いました。\n先生の本音として最もありえるのは？',
    hint:'状況と口調から真意を読み取ってください',
    opts:['心から褒めている','呆れながらも慰めている','怒っている','羨ましがっている'],
    ans:1, exp:'低い点数に対して「頑張ったね」という発言は、失望しつつも傷つけないよう配慮した表現です。'
  },
  {
    type:'sort', cat:'順番の常識', icon:'🔗',
    q:'次の出来事を起きた順番に並べ替えてください（上が先）',
    hint:'ドラッグ＆ドロップで並べ替えできます',
    items:[
      {id:'a',t:'☕ コップにお茶を注ぐ'},
      {id:'b',t:'🚿 やかんでお湯を沸かす'},
      {id:'c',t:'🍵 お茶を飲む'},
      {id:'d',t:'🫖 急須に茶葉を入れてお湯を注ぐ'}
    ],
    correctOrder:['b','d','a','c'],
    exp:'正しい順：お湯を沸かす → 急須で蒸らす → コップに注ぐ → 飲む'
  },
  {
    type:'choice', cat:'色と光', icon:'🎨',
    q:'晴れた日、最も涼しく感じる服の色はどれでしょう？',
    hint:'光の吸収と反射を考えてください',
    opts:['⬛ 黒','⬜ 白','🔴 赤','🔵 濃い青'],
    ans:1, exp:'白は光を反射するので熱を吸収しにくく、最も涼しく感じます。'
  },
  {
    type:'choice', cat:'生活の知恵', icon:'🏠',
    q:'洗濯物を早く乾かしたい。次の中で最も効果的な方法はどれ？',
    hint:'風通しと湿度を考えてください',
    opts:['日当たりの良い場所で風通しよく干す','浴室に干してドアを閉める','夜の室内に干す','厚く重ねて干す'],
    ans:0, exp:'日光と風があれば蒸発が促進されます。湿った場所や密閉空間では乾きにくくなります。'
  },
  {
    type:'choice', cat:'数のセンス', icon:'🔢',
    q:'1から10まで順番に足していくと（1+2+3+…+10）、答えはいくつになりますか？',
    hint:'実際に足してみてください。急がなくていいです！',
    opts:['45','50','55','100'],
    ans:2, exp:'1から10の合計は55です。1+10=11、2+9=11…と5組あるので 11×5=55。'
  },
  {
    type:'choice', cat:'言葉の意味', icon:'📖',
    q:'「猫に小判」ということわざの意味として正しいのはどれ？',
    hint:'ことわざはたとえ話です',
    opts:['猫はお金を好む','価値がわからない者には何を与えても意味がない','猫はとても賢い','小さなものでも大切にする'],
    ans:1, exp:'猫には小判（金貨）の価値がわからない → 価値のわからない相手に貴重なものを与えても無駄、という意味です。'
  },
  {
    type:'choice', cat:'物の特性', icon:'🔬',
    q:'次の中で「水に溶けやすい」ものはどれでしょう？',
    hint:'普段の生活を思い出してください',
    opts:['🧊 氷（固体の水）','🧂 塩','🪨 石','🛢️ 油'],
    ans:1, exp:'塩（食塩・塩化ナトリウム）は水によく溶けます。油は水とは混ざりません。'
  },
  {
    type:'sort', cat:'作業の順番', icon:'🍳',
    q:'目玉焼きを作る手順を正しい順番に並べ替えてください',
    hint:'実際に料理するときの順番を考えてください',
    items:[
      {id:'a',t:'🍳 フライパンを熱して油を引く'},
      {id:'b',t:'🥚 卵を割って入れる'},
      {id:'c',t:'🔥 コンロに火をつける'},
      {id:'d',t:'🍽️ お皿に盛り付ける'}
    ],
    correctOrder:['c','a','b','d'],
    exp:'正しい順：火をつける → フライパンを熱して油を引く → 卵を割る → 盛り付ける'
  },
];

// ────────────────────────────────────────────────────────────
// 設定
// ────────────────────────────────────────────────────────────
const N_Q         = 4;      // 出題数
const TIME_LIMIT  = 45;     // 秒（余裕を持たせる）
const MIN_MS      = 400;    // 最低回答時間ms（緩め）
const MAX_FAILS   = 3;      // 最大失敗数
const LOCK_SECS   = 90;     // ロック秒数
const PASS_NEED   = 3;      // 合格に必要な正解数

let S = {
  qs:[], step:0, score:0, fails:0,
  sel:null, items:[],
  timer:null, left:TIME_LIMIT,
  chStart:0,
  mouseD:0, mx:-1, my:-1,
  clicks:[], done:false,
};

// マウス追跡
document.addEventListener('mousemove',e=>{
  if(S.mx>=0) S.mouseD+=Math.hypot(e.clientX-S.mx,e.clientY-S.my);
  S.mx=e.clientX; S.my=e.clientY;
});
document.addEventListener('click',()=>S.clicks.push(Date.now()));

// Canvas fingerprint
function canvasFp(){
  try{
    const c=document.createElement('canvas'), x=c.getContext('2d');
    x.textBaseline='top'; x.font='14px Arial';
    x.fillStyle='#f60'; x.fillRect(80,1,40,12);
    x.fillStyle='#069'; x.fillText('sgk🔐',2,14);
    return c.toDataURL().length;
  }catch{return 0;}
}

// Bot判定（緩め）
function isBot(){
  const r=[];
  if(navigator.webdriver) r.push('webdriver');
  if(canvasFp()<100) r.push('canvas');
  const ua=navigator.userAgent;
  if(/HeadlessChrome|PhantomJS|selenium/i.test(ua)) r.push('ua');
  // クリックリズム（5回以上で均等すぎたら怪しい）
  if(S.clicks.length>=5){
    const d=S.clicks.slice(1).map((t,i)=>t-S.clicks[i]);
    const avg=d.reduce((a,b)=>a+b,0)/d.length;
    const sd=Math.sqrt(d.reduce((a,b)=>a+(b-avg)**2,0)/d.length);
    if(sd<50) r.push('click_rhythm');
  }
  return r.length>=2; // 2つ以上でbotと判定
}

// ────────────────────────────────────────────────────────────
// 初期化
// ────────────────────────────────────────────────────────────
function init(){
  S.qs=[...BANK].sort(()=>Math.random()-.5).slice(0,N_Q);
  // pips
  document.getElementById('pips').innerHTML=
    S.qs.map((_,i)=>`<div class="pip${i===0?' active':''}" id="pip${i}"></div>`).join('');
  showQ(0);
}

function setPips(){
  S.qs.forEach((_,i)=>{
    const p=document.getElementById('pip'+i);
    if(!p)return;
    p.className='pip'+(i<S.step?' done':i===S.step?' active':'');
  });
}

// ────────────────────────────────────────────────────────────
// 問題表示
// ────────────────────────────────────────────────────────────
function showQ(idx){
  if(idx>=N_Q){finish();return;}
  S.done=false; S.sel=null; S.chStart=Date.now();
  S.left=TIME_LIMIT; S.step=idx;
  setPips();
  document.getElementById('pbar').style.width=(idx/N_Q*100)+'%';
  const ch=S.qs[idx];
  const w=document.getElementById('ch-wrap');
  if(ch.type==='choice'){
    w.innerHTML=
      `<div class="ch-cat">${ch.icon} ${ch.cat}</div>`+
      `<div class="ch-q">${esc(ch.q)}</div>`+
      (ch.hint?`<div class="hint">💡 ${esc(ch.hint)}</div>`:'')+
      `<div class="opts">${ch.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="pick(${i})">${esc(o)}</button>`).join('')}</div>`;
  } else {
    S.items=ch.items.map(x=>({...x}));
    w.innerHTML=
      `<div class="ch-cat">${ch.icon} ${ch.cat}</div>`+
      `<div class="ch-q">${esc(ch.q)}</div>`+
      (ch.hint?`<div class="hint">💡 ${esc(ch.hint)}</div>`:'')+
      `<div class="sort-list" id="sl"></div>`;
    renderSort();
    makeDraggable();
    document.getElementById('sbtn').disabled=false;
  }
  hideFb();
  document.getElementById('sbtn').disabled=ch.type==='sort'?false:true;
  document.getElementById('sbtn').textContent='回答する';
  document.getElementById('sbtn').onclick=submit;
  startTimer();
}

function renderSort(){
  const sl=document.getElementById('sl');
  if(!sl)return;
  sl.innerHTML=S.items.map(x=>`<div class="sort-item" data-id="${x.id}"><span class="handle">⠿</span>${esc(x.t)}</div>`).join('');
}

function makeDraggable(){
  const sl=document.getElementById('sl');
  if(!sl)return;
  let drag=null;
  sl.querySelectorAll('.sort-item').forEach(el=>{
    el.draggable=true;
    el.ondragstart=()=>{drag=el;el.style.opacity='.45';};
    el.ondragend=()=>{el.style.opacity='1';drag=null;};
    el.ondragover=e=>{e.preventDefault();el.classList.add('dragover');};
    el.ondragleave=()=>el.classList.remove('dragover');
    el.ondrop=e=>{
      e.preventDefault();el.classList.remove('dragover');
      if(drag&&drag!==el){
        const all=[...sl.children];
        const fi=all.indexOf(drag),ti=all.indexOf(el);
        sl.insertBefore(drag,fi>ti?el:el.nextSibling);
        S.items=[...sl.children].map(c=>S.items.find(x=>x.id===c.dataset.id)).filter(Boolean);
      }
    };
  });
}

// ────────────────────────────────────────────────────────────
// タイマー
// ────────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    S.left--;
    const el=document.getElementById('tnum');
    const dot=document.getElementById('tdot');
    el.textContent=S.left;
    if(S.left>15){el.className='tnum ok';dot.className='tdot';}
    else if(S.left>7){el.className='tnum warn';dot.className='tdot warn';}
    else{el.className='tnum danger';dot.className='tdot danger';}
    if(S.left<=0){clearInterval(S.timer);timeout();}
  },1000);
}

function timeout(){
  S.fails++;
  showFb('warn','⏱ 時間切れ。次の問題に進みます。');
  S.qs[S.step]._result=false;
  if(S.fails>=MAX_FAILS){setTimeout(doLock,1200);return;}
  setTimeout(()=>{S.step++;showQ(S.step);},1800);
}

// ────────────────────────────────────────────────────────────
// 選択・提出
// ────────────────────────────────────────────────────────────
function pick(i){
  S.sel=i;
  document.querySelectorAll('.opt').forEach((el,j)=>el.classList.toggle('sel',j===i));
  document.getElementById('sbtn').disabled=false;
}

function submit(){
  if(S.done)return;
  const elapsed=Date.now()-S.chStart;
  // Bot検出（緩め）
  if(elapsed<MIN_MS){
    showFb('warn',`⚡ 少し落ち着いて読んでから回答してください。（残り${S.left}秒）`);
    return;
  }
  if(isBot()){
    S.fails++;
    showFb('ng','🤖 自動化ツールの疑いがあります。通常のブラウザでお試しください。');
    if(S.fails>=MAX_FAILS){setTimeout(doLock,1500);return;}
    return;
  }
  S.done=true;
  clearInterval(S.timer);
  const ch=S.qs[S.step];
  if(ch.type==='choice'){
    if(S.sel===null){S.done=false;showFb('warn','選択肢を選んでください');return;}
    const ok=S.sel===ch.ans;
    ch.opts.forEach((_,i)=>{
      const el=document.getElementById('o'+i);
      if(!el)return;
      el.disabled=true;
      if(i===ch.ans)el.classList.add('ok');
      else if(i===S.sel&&!ok)el.classList.add('ng');
    });
    proceed(ok,ch);
  } else {
    const sl=document.getElementById('sl');
    const order=sl?[...sl.children].map(c=>c.dataset.id):[];
    const ok=JSON.stringify(order)===JSON.stringify(ch.correctOrder);
    if(sl){
      [...sl.children].forEach((el,p)=>{
        const c=el.dataset.id===ch.correctOrder[p];
        el.style.borderColor=c?'var(--ok)':'var(--ng)';
        el.style.background=c?'rgba(16,185,129,.1)':'rgba(239,68,68,.08)';
        el.style.cursor='default';
      });
    }
    proceed(ok,ch);
  }
}

function proceed(ok,ch){
  if(ok){
    S.score++;
    showFb('ok',`✓ 正解！　${ch.exp||''}`);
  } else {
    S.fails++;
    showFb('ng',`✗ 不正解。　${ch.exp||''}`);
    if(S.fails>=MAX_FAILS){setTimeout(doLock,1800);return;}
  }
  const b=document.getElementById('sbtn');
  b.textContent='次へ →'; b.disabled=false;
  b.onclick=()=>{b.onclick=submit;S.step++;showQ(S.step);};
  setTimeout(()=>b.click(),3000);
}

// ────────────────────────────────────────────────────────────
// 完了処理
// ────────────────────────────────────────────────────────────
function finish(){
  clearInterval(S.timer);
  document.getElementById('pbar').style.width='100%';
  document.querySelector('.timer-row').style.display='none';
  setPips();
  document.getElementById('ch-wrap').style.display='none';
  document.getElementById('fb').style.display='none';
  document.getElementById('sbtn').style.display='none';
  if(S.score>=PASS_NEED){
    const tok='SGK-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Math.random().toString(36).slice(2,10).toUpperCase();
    document.getElementById('tok').textContent=tok;
    document.getElementById('success').style.display='block';
  } else {
    // 再チャレンジ
    document.getElementById('ch-wrap').style.display='block';
    document.getElementById('ch-wrap').innerHTML=`<div style="text-align:center;padding:1.5rem 0"><div style="font-size:2rem;margin-bottom:.6rem">😔</div><div style="font-size:.95rem;font-weight:600;margin-bottom:.4rem">${N_Q}問中${S.score}問正解でした</div><div style="font-size:.82rem;color:var(--muted)">${PASS_NEED}問以上の正解が必要です</div></div>`;
    document.getElementById('sbtn').style.display='block';
    document.getElementById('sbtn').textContent='もう一度チャレンジする';
    document.getElementById('sbtn').disabled=false;
    document.getElementById('sbtn').onclick=()=>location.reload();
  }
}

function doLock(){
  clearInterval(S.timer);
  ['ch-wrap','sbtn','fb'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.display='none';
  });
  document.querySelector('.timer-row').style.display='none';
  document.getElementById('lock').style.display='block';
  let n=LOCK_SECS;
  const cd=document.getElementById('lcount');
  cd.textContent=n;
  const t=setInterval(()=>{n--;cd.textContent=n;if(n<=0){clearInterval(t);location.reload();}},1000);
}

function showFb(cls,msg){
  const el=document.getElementById('fb');
  el.className='fb '+cls;
  el.textContent=msg;
}
function hideFb(){
  const el=document.getElementById('fb');
  el.className='fb'; el.textContent='';
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script></body></html>
