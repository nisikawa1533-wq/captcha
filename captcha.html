<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>人間確認 — sugaku-club.com</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#05071a;--bg2:#080b22;--pu:#7c3aed;--pu2:#9f5cf7;--cy:#06b6d4;--ok:#10b981;--ng:#ef4444;--gd:#f59e0b;--txt:#f1f5f9;--muted:#64748b;--border:rgba(124,58,237,.2)}body{background:var(--bg);color:var(--txt);font-family:'Outfit','Noto Sans JP',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}a{color:inherit;text-decoration:none}.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:520px;box-shadow:0 24px 80px rgba(0,0,0,.5)}.logo{font-size:1rem;font-weight:700;background:linear-gradient(135deg,var(--pu2),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;text-align:center;margin-bottom:.2rem}.site{text-align:center;font-size:.75rem;color:var(--muted);margin-bottom:.3rem}.title{text-align:center;font-size:1.1rem;font-weight:700;margin-bottom:1.5rem}.progress-track{background:rgba(255,255,255,.08);height:4px;border-radius:4px;margin-bottom:1rem;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(90deg,var(--pu),var(--cy));border-radius:4px;transition:.5s}.pips{display:flex;justify-content:center;gap:.5rem;margin-bottom:1.5rem}.pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:.3s}.pip.done{background:var(--ok)}.pip.active{background:var(--pu)}.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:.5rem .8rem;background:rgba(255,255,255,.04);border-radius:10px;font-size:.82rem}.timer-num{font-weight:700;color:var(--cy);font-family:monospace;font-size:1rem}.timer-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 1s infinite}.timer-dot.warn{background:var(--ng)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.ch-wrap{min-height:200px}.ch-cat{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}.ch-q{font-size:.95rem;font-weight:600;line-height:1.5;margin-bottom:.8rem;white-space:pre-line}.ch-hint{font-size:.75rem;color:var(--muted);margin-bottom:1rem;font-style:italic}.ch-vis{margin:.8rem 0;border-radius:10px;overflow:hidden}.opts{display:flex;flex-direction:column;gap:.5rem}.opt{padding:.65rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:.87rem;transition:.2s;text-align:left}.opt:hover{border-color:var(--pu);background:rgba(124,58,237,.08)}.opt.selected{border-color:var(--pu);background:rgba(124,58,237,.12);font-weight:600}.opt.ok{border-color:var(--ok);background:rgba(16,185,129,.1);pointer-events:none}.opt.ng{border-color:var(--ng);background:rgba(239,68,68,.1);pointer-events:none}.opt:disabled{cursor:default}.sort-list{display:flex;flex-direction:column;gap:.5rem}.sort-item{padding:.65rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;font-size:.85rem;cursor:grab;display:flex;align-items:center;gap:.6rem;transition:.2s;user-select:none}.sort-item:active{cursor:grabbing}.sort-item .handle{color:var(--muted)}.sort-item.drag-over{border-color:var(--pu);background:rgba(124,58,237,.1)}.fb{min-height:2.2rem;margin:.8rem 0;padding:.5rem .8rem;border-radius:8px;font-size:.82rem;text-align:center;display:none}.fb.ok{display:block;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--ok)}.fb.ng{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--ng)}.fb.warn{display:block;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--gd)}.sbtn{width:100%;padding:.75rem;background:linear-gradient(135deg,var(--pu),var(--cy));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;margin-top:.5rem}.sbtn:hover{opacity:.85}.sbtn:disabled{opacity:.4;cursor:not-allowed}.footer-note{text-align:center;font-size:.73rem;color:var(--muted);margin-top:1.2rem}.success-screen{display:none;text-align:center}.success-screen .big{font-size:3rem;margin-bottom:.8rem;animation:pop .5s}.success-screen h2{font-size:1.3rem;font-weight:800;margin-bottom:.5rem}.success-screen p{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}.token-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;font-family:monospace;font-size:.95rem;text-align:center;margin-bottom:1.2rem;color:var(--cy)}.go-btn{padding:.75rem 2rem;background:linear-gradient(135deg,var(--pu),var(--cy));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer}.lock-screen{display:none;text-align:center}.lock-screen .icon{font-size:2.5rem;margin-bottom:.8rem}.lock-screen h2{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;color:var(--ng)}.lock-screen p{font-size:.83rem;color:var(--muted)}.countdown{font-size:2rem;font-weight:800;color:var(--ng);font-family:monospace;margin:1rem 0}@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.2)}100%{transform:scale(1)}}</style></head><body>

<script>
// ── チャレンジバンク ───────────────────────────────────
const BANK = [
  {
    type:'choice', cat:'物理直感', icon:'⚖️', diff:3,
    q:'同じ大きさの箱に入っています。足の上に落ちたとき、最も痛いのはどれでしょう？',

    opts:['本当に優秀だと思っている','皮肉を言っている（呆れている）','前向きに励ましている','感情を抑えて怒っている'],

  },

    hint:'アルキメデスの原理を思い出してください',
    opts:['鉄は実は水より軽いから','排除した水の重さが船全体の重さを上回るから','エンジンが水を押しているから','鉄が水を吸って密度が下がるから'],
    ans:1, exp:'アルキメデスの原理：船の内部は空洞で体積が大きく、排除する水の重さが船体の重さを超えます。'
  },
  {
    type:'choice', cat:'常識的不可能性', icon:'🚫', diff:5,
    q:'現実世界で絶対に起こりえないものを選んでください。',
    hint:'物理法則・熱力学の観点から考えてください',
    opts:['光が重力で曲がる','時間が速度によって遅れる','−273.15°Cより低い温度になる','音が真空中で伝わらない'],
    ans:2, exp:'絶対零度（−273.15°C = 0K）は熱力学の下限。他の3つはすべて実際に観測・証明されています。'
  },
  {
    type:'choice', cat:'数学的直感', icon:'🧮', diff:4,
    q:'1枚の紙を41回半分に折ったとき、その厚さに最も近いものは？\n（紙1枚≈0.1mm）',
    hint:'2ⁿ の指数的増加を考えましょう',
    opts:['東京タワーの高さ（約333m）','富士山の高さ（約3,776m）','地球〜月の距離（約38万km）','スカイツリーの高さ（約634m）'],
    ans:2, exp:'2⁴¹ × 0.1mm ≈ 220,000km。指数爆発は直感をはるかに超えます。'
  },
  {
    type:'choice', cat:'社会的推論', icon:'🧠', diff:4,
    q:'同僚に「このコード、すごく…独創的ですね」と言われました。\nこの発言の本当の意味は？',
    hint:'職場の文脈と三点リーダーのトーンを考えてください',
    opts:['本当に革新的で素晴らしい','読みにくく問題があると思っている','感動して言葉が出てこない','コードを褒める習慣がある人'],
    ans:1, exp:'「独創的」＋三点リーダーは婉曲的な否定表現。変わった（=問題のある）コードを遠回しに指摘しています。'
  },
  {
    type:'choice', cat:'感覚的常識', icon:'🌡️', diff:3,
    q:'真夏（35°C）の屋外に1時間置いたとき、触って最も熱いのはどれ？',
    hint:'熱容量・熱伝導率・色を考えてください',
    opts:['⬛ 黒い金属板','⬜ 白い木の板','💧 水のペットボトル','🍵 白い陶器カップ'],
    ans:0, exp:'黒色は光を最もよく吸収し、金属は熱伝導率が高いため素早く高温になります。'
  },
  {
    type:'sort', cat:'因果・時系列推論', icon:'🔗', diff:5,
    q:'次の出来事を物理的に正しい順序に並べ替えてください（上が先）',
    hint:'ドラッグ＆ドロップで並べ替えできます',
    items:[{id:'a',t:'🤲 手がすべってコップを手放す'},{id:'b',t:'💧 コップが地面に落ちて割れる'},{id:'c',t:'🌊 水がこぼれ床を濡らす'},{id:'d',t:'🧹 床を拭き掃除する'}],
    correctOrder:['a','b','c','d'],
    exp:'正しい順：手放す→落下して割れる→水がこぼれる→掃除'
  },
  {
    type:'choice', cat:'視点の理解', icon:'👁️', diff:3,
    q:'「明日雨が降るかもしれない」という発言で話者は何を伝えたいか？',
    hint:'話者の確信度とコミュニケーション意図を考えてください',
    opts:['明日必ず雨が降ると確信している','傘を持っていくよう提案している','天気を話題にして会話を始めたい','雨を降らせることができる'],
    ans:1, exp:'日本語の「かもしれない」は不確実性を示しますが、文脈上は傘を準備する提案として機能します。'
  },
];

// ── 状態管理 ─────────────────────────────────────────
const QUESTIONS = 4;
const TIME_LIMIT = 30;
const MIN_ANSWER_MS = 1500; // 1.5秒未満は弾く
const MAX_FAILS = 3;
const LOCK_SECS = 90;
const PASS_THRESHOLD = 3; // 4問中3問正解

let st = {
  q: [],          // 選ばれた問題
  step: 0,
  score: 0,
  fails: 0,
  results: [],
  sel: null,      // 選択肢インデックス
  items: [],      // ソート問題のアイテム
  timer: null,
  timeLeft: TIME_LIMIT,
  chStart: null,
  done: false,
  mouseTotal: 0,  // マウス移動距離
  clickTimes: [], // クリックタイムスタンプ
};

// マウス追跡
let lastX = -1, lastY = -1;
document.addEventListener('mousemove', (e) => {
  if (lastX >= 0) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    st.mouseTotal += Math.sqrt(dx*dx + dy*dy);
  }
  lastX = e.clientX; lastY = e.clientY;
});
document.addEventListener('click', () => {
  st.clickTimes.push(Date.now());
});

// Canvas fingerprint (ヘッドレス検出)
function getCanvasFp() {
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = '#069';
    ctx.fillText('sugaku🔐', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('sugaku🔐', 4, 17);
    return c.toDataURL().length;
  } catch { return 0; }
}

function detectBot() {
  const issues = [];
  // Canvas指紋（ヘッドレスは異常値）
  const fp = getCanvasFp();
  if (fp < 100) issues.push('canvas_fail');
  // ユーザーエージェント
  const ua = navigator.userAgent;
  if (/HeadlessChrome|PhantomJS|Selenium|webdriver/i.test(ua)) issues.push('ua_bot');
  // webdriver プロパティ
  if (navigator.webdriver) issues.push('webdriver');
  // クリックリズム（均等すぎる = bot）
  if (st.clickTimes.length >= 3) {
    const diffs = st.clickTimes.slice(1).map((t,i)=>t-st.clickTimes[i]);
    const avg = diffs.reduce((a,b)=>a+b,0)/diffs.length;
    const variance = diffs.reduce((a,b)=>a+(b-avg)**2,0)/diffs.length;
    if (variance < 100) issues.push('uniform_clicks');
  }
  return { issues, isBot: issues.length >= 2 };
}

// ── 初期化 ────────────────────────────────────────────
function init() {
  // ランダムに4問選択
  const shuffled = [...BANK].sort(() => Math.random() - 0.5);
  st.q = shuffled.slice(0, QUESTIONS);
  renderPips();
  showStep(0);
}

function renderPips() {
  const el = document.getElementById('pips');
  el.innerHTML = st.q.map((_,i) => `<div class="pip" id="pip${i}"></div>`).join('');
  document.getElementById('pip0').classList.add('active');
}

function updateProgress() {
  const pct = (st.step / QUESTIONS) * 100;
  document.getElementById('pbar').style.width = pct + '%';
  for (let i = 0; i < QUESTIONS; i++) {
    const p = document.getElementById('pip'+i);
    if (!p) continue;
    p.className = 'pip' + (i < st.step ? ' done' : i === st.step ? ' active' : '');
  }
}

// ── 問題表示 ──────────────────────────────────────────
function showStep(idx) {
  if (idx >= QUESTIONS) { showResult(); return; }
  st.done = false;
  st.sel = null;
  st.chStart = Date.now();
  st.timeLeft = TIME_LIMIT;
  updateProgress();
  const ch = st.q[idx];
  const wrap = document.getElementById('ch-wrap');
  if (ch.type === 'choice') {
    wrap.innerHTML = `
      <div class="ch-cat">${ch.icon} ${ch.cat}</div>
      <div class="ch-q">${escHtml(ch.q)}</div>
      ${ch.hint ? `<div class="ch-hint">💡 ヒント: ${escHtml(ch.hint)}</div>` : ''}
      <div class="opts" id="opts">${ch.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="selectOpt(${i})">${escHtml(o)}</button>`).join('')}</div>
    `;
  } else { // sort
    st.items = ch.items.map(x=>({...x}));
    renderSort(ch);
  }
  hideFb();
  document.getElementById('sbtn').disabled = true;
  startTimer();
}

function renderSort(ch) {
  const wrap = document.getElementById('ch-wrap');
  wrap.innerHTML = `
    <div class="ch-cat">${ch.icon} ${ch.cat}</div>
    <div class="ch-q">${escHtml(ch.q)}</div>
    ${ch.hint ? `<div class="ch-hint">💡 ヒント: ${escHtml(ch.hint)}</div>` : ''}
    <div class="sort-list" id="sortList"></div>
  `;
  updateSortUI();
  document.getElementById('sbtn').disabled = false;
  // ドラッグアンドドロップ
  let dragging = null;
  function makeDraggable() {
    const list = document.getElementById('sortList');
    if (!list) return;
    list.querySelectorAll('.sort-item').forEach(el => {
      el.draggable = true;
      el.ondragstart = () => { dragging = el; el.style.opacity = '.5'; };
      el.ondragend = () => { el.style.opacity = '1'; dragging = null; };
      el.ondragover = e => { e.preventDefault(); el.classList.add('drag-over'); };
      el.ondragleave = () => el.classList.remove('drag-over');
      el.ondrop = e => {
        e.preventDefault();
        el.classList.remove('drag-over');
        if (dragging && dragging !== el) {
          const items = [...list.children];
          const fromIdx = items.indexOf(dragging);
          const toIdx = items.indexOf(el);
          if (fromIdx > toIdx) list.insertBefore(dragging, el);
          else list.insertBefore(dragging, el.nextSibling);
          // st.items更新
          const newOrder = [...list.children].map(c => c.dataset.id);
          st.items = newOrder.map(id => st.items.find(x=>x.id===id)||{id,t:''});
        }
      };
    });
  }
  setTimeout(makeDraggable, 10);
}

function updateSortUI() {
  const list = document.getElementById('sortList');
  if (!list) return;
  list.innerHTML = st.items.map(x => `<div class="sort-item" data-id="${x.id}"><span class="handle">⠿</span>${escHtml(x.t)}</div>`).join('');
}

function selectOpt(i) {
  st.sel = i;
  document.querySelectorAll('.opt').forEach((el,j)=>{
    el.classList.toggle('selected', j===i);
  });
  document.getElementById('sbtn').disabled = false;
}

// ── タイマー ──────────────────────────────────────────
function startTimer() {
  clearInterval(st.timer);
  st.timer = setInterval(() => {
    st.timeLeft--;
    document.getElementById('tnum').textContent = st.timeLeft;
    const dot = document.getElementById('tdot');
    if (st.timeLeft <= 10) dot.classList.add('warn'); else dot.classList.remove('warn');
    if (st.timeLeft <= 0) { clearInterval(st.timer); timeOut(); }
  }, 1000);
}

function timeOut() {
  st.fails++;
  showFb('ng', '⏱ 時間切れです。次の問題に進みます。');
  if (st.fails >= MAX_FAILS) { doLock(); return; }
  st.results.push(false);
  setTimeout(() => { st.step++; showStep(st.step); }, 2000);
}

// ── 判定・提出 ────────────────────────────────────────
function handleSubmit() {
  if (st.done) return;

  // === BOTチェック ===
  const elapsed = st.chStart ? Date.now() - st.chStart : 9999;
  // 速すぎる回答（1.5秒以内）
  if (elapsed < MIN_ANSWER_MS) {
    showFb('warn', '⚡ 回答が速すぎます。もう少し考えてから回答してください。');
    return;
  }
  // マウス未移動（PCの場合）
  if (st.step === 0 && st.mouseTotal < 5 && !('ontouchstart' in window)) {
    showFb('warn', '🖱️ まずマウスを画面上で動かしてください。');
    return;
  }
  // Bot検出
  const botResult = detectBot();
  if (botResult.isBot) {
    st.fails++;
    if (st.fails >= MAX_FAILS) { doLock(); return; }
    showFb('ng', '🤖 自動化ツールの使用が検出されました。通常のブラウザでお試しください。');
    return;
  }
  // =====================

  st.done = true;
  clearInterval(st.timer);
  const ch = st.q[st.step];

  if (ch.type === 'choice') {
    if (st.sel === null) { st.done = false; showFb('warn', '選択肢を選んでください'); return; }
    const ok = st.sel === ch.ans;
    markChoice(ok, ch);
    if (ok) doCorrect(ch); else doWrong(ch);
  } else {
    const userOrder = [...document.getElementById('sortList').children].map(el=>el.dataset.id);
    const ok = JSON.stringify(userOrder) === JSON.stringify(ch.correctOrder);
    markSort(ok, ch);
    if (ok) doCorrect(ch); else doWrong(ch);
  }
}

function markChoice(ok, ch) {
  ch.opts.forEach((_,i)=>{
    const el = document.getElementById('opt'+i);
    if (!el) return;
    el.disabled = true;
    if (i === ch.ans) el.classList.add('ok');
    else if (i === st.sel && !ok) el.classList.add('ng');
  });
}

function markSort(ok, ch) {
  const list = document.getElementById('sortList');
  if (!list) return;
  [...list.children].forEach((el,pos)=>{
    const correct = el.dataset.id === ch.correctOrder[pos];
    el.style.borderColor = correct ? 'var(--ok)' : 'var(--ng)';
    el.style.background = correct ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)';
  });
}

function doCorrect(ch) {
  st.score++;
  st.results.push(true);
  showFb('ok', '✓ 正解！ ' + (ch.exp || ''));
  const btn = document.getElementById('sbtn');
  btn.textContent = '次へ →'; btn.disabled = false;
  btn.onclick = nextStep;
  setTimeout(nextStep, 2800);
}

function doWrong(ch) {
  st.fails++;
  st.results.push(false);
  showFb('ng', '✗ 不正解。' + (ch.exp || ''));
  if (st.fails >= MAX_FAILS) { setTimeout(doLock, 1500); return; }
  const btn = document.getElementById('sbtn');
  btn.textContent = '次へ →'; btn.disabled = false;
  btn.onclick = nextStep;
  setTimeout(nextStep, 3000);
}

function nextStep() {
  clearInterval(st.timer);
  document.getElementById('sbtn').onclick = handleSubmit;
  document.getElementById('sbtn').textContent = '回答する';
  st.step++;
  showStep(st.step);
}

function doLock() {
  clearInterval(st.timer);
  document.getElementById('ch-wrap').style.display='none';
  document.getElementById('sbtn').style.display='none';
  document.getElementById('fb').style.display='none';
  document.getElementById('lock').style.display='block';
  let secs = LOCK_SECS;
  const cd = document.getElementById('lockdown');
  cd.textContent = secs;
  const t = setInterval(()=>{
    secs--;
    cd.textContent=secs;
    if(secs<=0){
      clearInterval(t);
      location.reload();
    }
  },1000);
}

function showResult() {
  clearInterval(st.timer);
  document.getElementById('timer-row') && (document.querySelector('.timer-row').style.display='none');
  if (st.score >= PASS_THRESHOLD) {
    document.getElementById('ch-wrap').style.display='none';
    document.getElementById('sbtn').style.display='none';
    document.getElementById('fb').style.display='none';
    const token = 'SGK-' + Math.random().toString(36).substr(2,4).toUpperCase() + '-' + Math.random().toString(36).substr(2,8).toUpperCase();
    document.getElementById('token-box').textContent = token;
    document.getElementById('success').style.display='block';
    document.querySelector('.progress-bar').style.width='100%';
  } else {
    showFb('ng', `${QUESTIONS}問中${st.score}問正解でした。あと${PASS_THRESHOLD - st.score}問正解が必要です。`);
    document.getElementById('sbtn').textContent = '最初からやり直す';
    document.getElementById('sbtn').disabled = false;
    document.getElementById('sbtn').onclick = () => location.reload();
  }
}

function showFb(type, msg) {
  const el = document.getElementById('fb');
  el.className = 'fb ' + type;
  el.textContent = msg;
}

function hideFb() {
  const el = document.getElementById('fb');
  el.className = 'fb';
  el.textContent = '';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script></body></html>
